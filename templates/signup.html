<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join GuardJob | Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        
        @keyframes gradient-x {
            0%, 100% { background-position: left center; }
            50% { background-position: right center; }
        }
        
        .animate-gradient {
            background-size: 200% 200%;
            animation: gradient-x 15s ease infinite;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body class="bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 min-h-screen flex items-center justify-center p-6 animate-gradient font-sans">

    <div class="glass max-w-md w-full p-8 md:p-10 rounded-3xl shadow-2xl text-center fade-in">
        <div class="bg-indigo-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-6 text-white shadow-lg shadow-indigo-200">
            <i data-lucide="user-plus" class="w-8 h-8"></i>
        </div>

        <h1 class="text-3xl font-extrabold text-gray-900 mb-2 tracking-tight">Join GuardJob</h1>
        <p class="text-gray-500 mb-8 font-medium">Create an account to start detecting fraud.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="mb-4 p-3 rounded-xl text-sm font-semibold 
                {% if category == 'danger' %} bg-red-100 text-red-700 {% else %} bg-emerald-100 text-emerald-700 {% endif %}">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="/signup" method="POST" class="space-y-5 text-left">
            <div>
                <label class="block text-sm font-bold text-gray-700 ml-1 mb-1.5">Choose Username</label>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400 group-focus-within:text-indigo-600 transition-colors">
                        <i data-lucide="user" class="w-5 h-5"></i>
                    </span>
                    <input 
                        type="text" 
                        name="username" 
                        placeholder="e.g. Sriram_Koona" 
                        required 
                        class="w-full pl-12 pr-4 py-4 rounded-xl border border-gray-200 bg-white/50 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all text-gray-800"
                    >
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 ml-1 mb-1.5">Set Password</label>
                <div class="relative group">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400 group-focus-within:text-indigo-600 transition-colors">
                        <i data-lucide="key-round" class="w-5 h-5"></i>
                    </span>
                    <input 
                        type="password" 
                        name="password" 
                        placeholder="••••••••" 
                        required 
                        class="w-full pl-12 pr-4 py-4 rounded-xl border border-gray-200 bg-white/50 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all text-gray-800"
                    >
                </div>
            </div>

            <button 
                type="submit" 
                class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-600/20 transform transition-all active:scale-95 flex items-center justify-center gap-2 mt-4"
            >
                Create My Account
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </form>
        
        <div class="mt-8 pt-6 border-t border-gray-100">
            <p class="text-sm text-gray-600 font-medium">
                Already have an account? 
                <a href="/login" class="text-indigo-600 font-bold hover:text-indigo-800 transition-colors underline decoration-indigo-200 decoration-2 underline-offset-4">
                    Log In instead
                </a>
            </p>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();
    </script>
</body>
</html>
